# =============================================================================
# GODL1KE .tmux.conf — Terminal Multiplexer Configuration
# =============================================================================
# WHY: tmux lets you run multiple Claude Code sessions in parallel, each
# in its own named session. Switch between projects with a keystroke.
# This config sets sane defaults, vim-style navigation, and a clean status bar.
# Location: ~/.tmux.conf
# =============================================================================

# -----------------------------------------------------------------------------
# Prefix Key — Ctrl+A (easier to reach than default Ctrl+B)
# -----------------------------------------------------------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# -----------------------------------------------------------------------------
# General Settings
# -----------------------------------------------------------------------------
set -g default-terminal "xterm-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on                    # Enable mouse (scrolling, clicking panes)
set -g history-limit 50000         # Generous scroll buffer
set -g base-index 1                # Windows start at 1 (not 0)
setw -g pane-base-index 1          # Panes start at 1
set -g renumber-windows on         # Re-number windows when one is closed
set -sg escape-time 0              # No delay after pressing Escape
set -g focus-events on             # Pass focus events to apps (needed for Vim)
set -g set-clipboard on            # System clipboard integration

# -----------------------------------------------------------------------------
# Key Bindings — Window/Pane Management
# -----------------------------------------------------------------------------
# Split panes with | and - (more intuitive than % and ")
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window inherits current path
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with Shift+Arrow
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quick reload config
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# -----------------------------------------------------------------------------
# Session Switching — Quick project jump
# -----------------------------------------------------------------------------
# WHY: These bindings let you jump between project sessions instantly.
# Ctrl+A then the key = switch to that project session.
bind-key F1 switch-client -t lxs
bind-key F2 switch-client -t persimmon
bind-key F3 switch-client -t adtecher
bind-key F4 switch-client -t wayv
bind-key F5 switch-client -t clubrevai
bind-key F6 switch-client -t ledgx

# Session picker (fuzzy)
bind s choose-session

# -----------------------------------------------------------------------------
# Status Bar — Clean and informative
# -----------------------------------------------------------------------------
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=colour235,fg=colour248"

# Left: session name
set -g status-left-length 30
set -g status-left "#[fg=colour46,bold] #S #[fg=colour248]│ "

# Right: date + time
set -g status-right-length 50
set -g status-right "#[fg=colour248]│ #[fg=colour117]%H:%M #[fg=colour248]│ #[fg=colour223]%d %b"

# Window tabs
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[fg=colour46,bold] #I:#W "

# -----------------------------------------------------------------------------
# Copy Mode — Vim style
# -----------------------------------------------------------------------------
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"
